name: Build and deploy ASP.Net Core app to Azure Web App - DailyTaskMakerApi 

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore ./DailyTaskMakerAPI/DailyTaskMakerAPI.csproj

      - name: Build with dotnet
        run: dotnet build ./DailyTaskMakerAPI/DailyTaskMakerAPI.csproj --configuration Release --no-restore

      - name: dotnet publish
        run: dotnet publish ./DailyTaskMakerAPI/DailyTaskMakerAPI.csproj -c Release -o ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish

  deploy:
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'DailyTaskMakerApi'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_4EBFA301B9074FEC98BD906ACA7F2821 }}
